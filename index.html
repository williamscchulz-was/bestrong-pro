<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Be Strong Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--purple:#7c3aed;--purple-l:#a78bfa;--purple-d:#5b21b6;--pbg:rgba(124,58,237,.08);--pbg2:rgba(124,58,237,.15);--orange:#f97316;--orange-l:#fdba74;--obg:rgba(249,115,22,.08);--obg2:rgba(249,115,22,.15);--green:#10b981;--gbg:rgba(16,185,129,.1);--red:#ef4444;--rbg:rgba(239,68,68,.1);--blue:#3b82f6;--bbg:rgba(59,130,246,.1);--gold:#eab308;--gobg:rgba(234,179,8,.1);--f:'Nunito Sans',sans-serif;--fh:'Plus Jakarta Sans',sans-serif;--r:16px;--rs:12px;--tr:all .25s cubic-bezier(.4,0,.2,1)}
[data-theme="light"]{--bg:#f4f0fa;--bg2:#ede8f5;--sf:#fff;--sf2:#f8f6fc;--tx:#1a1a2e;--tx2:#555570;--tx3:#9090a8;--bd:#e8e4f0;--bd2:#d8d4e2;--nav:rgba(255,255,255,.92);--hdr:rgba(244,240,250,.88);--csh:0 2px 16px rgba(124,58,237,.06);--inp:#f4f0fa;--side:#fff;--side-bd:#e8e4f0}
[data-theme="dark"]{--bg:#0f0b1a;--bg2:#161122;--sf:#1c1630;--sf2:#231c3a;--tx:#ede8f5;--tx2:#a8a0c0;--tx3:#6b6388;--bd:#2d2545;--bd2:#3d3555;--nav:rgba(28,22,48,.95);--hdr:rgba(15,11,26,.9);--csh:0 2px 16px rgba(0,0,0,.2);--inp:#231c3a;--side:#130f22;--side-bd:#2d2545}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden}

/* ═══ LAYOUT SHELL ═══ */
.app{display:flex;min-height:100dvh}

/* SIDEBAR — desktop only */
.side{width:260px;background:var(--side);border-right:1px solid var(--side-bd);display:none;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.side-brand{padding:28px 22px 22px;border-bottom:1px solid var(--bd);text-align:center;position:relative;overflow:hidden}
.side-brand::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--pbg) 0%,transparent 70%)}
.side-logo{width:56px;height:56px;border-radius:16px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--purple),var(--orange));box-shadow:0 6px 24px rgba(124,58,237,.3)}
.side-logo svg{width:26px;height:26px}
.side-name{font-family:var(--fh);font-size:22px;font-weight:800;margin-bottom:2px}.side-name span{color:var(--orange)}
.side-sub{font-size:10px;color:var(--tx3);letter-spacing:2px;font-weight:600;text-transform:uppercase}
.side-nav{padding:16px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.snb{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;border:none;cursor:pointer;width:100%;text-align:left;font-family:var(--f);font-size:14px;font-weight:600;color:var(--tx3);background:transparent;transition:var(--tr);position:relative}
.snb:hover{background:var(--sf2);color:var(--tx)}
.snb.ac{background:var(--pbg2);color:var(--purple)}
.snb.ac::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--purple);border-radius:0 2px 2px 0}
.snb svg{width:20px;height:20px;flex-shrink:0}
.side-section{padding:8px 16px;font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-top:8px}
.side-foot{padding:16px;border-top:1px solid var(--bd);text-align:center}
.side-foot-vals{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.side-val{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--tx3);font-weight:500}
.side-dot{width:6px;height:6px;border-radius:50%;background:var(--purple);flex-shrink:0}
.side-copy{font-size:10px;color:var(--tx3);letter-spacing:.3px}

.main-wrap{flex:1;min-height:100dvh}

/* HEADER */
.hd{position:sticky;top:0;z-index:80;padding:12px 20px;background:var(--hdr);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.hd-b{display:flex;align-items:center;gap:10px}
.hd-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--orange));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(124,58,237,.25)}
.hd-logo svg{width:18px;height:18px}
.hd-t{font-family:var(--fh);font-size:18px;font-weight:800}.hd-t span{color:var(--orange)}
.hd-a{display:flex;gap:8px;align-items:center}
.ib{width:40px;height:40px;border-radius:12px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:var(--tr)}
.ib:active{transform:scale(.92)}.ib svg{width:18px;height:18px}
.nd{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--sf)}
.hd-loc{font-size:12px;color:var(--tx3);display:none;align-items:center;gap:6px}
.hd-loc svg{width:14px;height:14px}

/* BOTTOM NAV — mobile only */
.bn{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding:6px 8px calc(env(safe-area-inset-bottom,8px)+6px);display:flex;justify-content:space-around;align-items:center}
.tb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border:none;background:none;cursor:pointer;color:var(--tx3);font-family:var(--f);font-size:10px;font-weight:700;transition:var(--tr);border-radius:12px;min-width:48px}
.tb svg{width:22px;height:22px;transition:var(--tr)}.tb.ac{color:var(--purple)}.tb.ac svg{transform:scale(1.08)}.tb:active{transform:scale(.9)}

/* CONTENT */
.pc{padding:16px 20px 100px;min-height:calc(100dvh - 65px)}
.pg{display:none}.pg.av{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* CARDS */
.cd{background:var(--sf);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--csh);border:1px solid var(--bd);transition:var(--tr);cursor:default}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ct{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--tx2)}
.hc{background:linear-gradient(135deg,var(--purple-d),var(--purple),var(--orange));border-radius:var(--r);padding:24px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.hc::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.hc::after{content:'';position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.05)}
.hl{font-size:12px;opacity:.8;font-weight:600;letter-spacing:.5px;margin-bottom:4px}
.hv{font-family:var(--fh);font-size:30px;font-weight:800;margin-bottom:2px}
.hs{font-size:13px;opacity:.7}
.hr{display:flex;gap:16px;margin-top:18px}.hst{flex:1}.hstl{font-size:10px;opacity:.6;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.hstv{font-family:var(--fh);font-size:18px;font-weight:800;margin-top:2px}

/* STAT GRID */
.sr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sp{background:var(--sf);border-radius:var(--rs);padding:16px;border:1px solid var(--bd);transition:var(--tr)}
.sp:active{transform:scale(.97)}
.spi{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.spi svg{width:18px;height:18px}
.spl{font-size:11px;color:var(--tx3);font-weight:600;margin-bottom:4px}
.spv{font-family:var(--fh);font-size:20px;font-weight:800}
.sps{font-size:11px;color:var(--tx3);margin-top:2px}

/* LIST ITEMS */
.li{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--sf);border-radius:var(--rs);border:1px solid var(--bd);margin-bottom:8px;cursor:pointer;transition:var(--tr)}
.li:active{transform:scale(.98);background:var(--sf2)}
.la{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.ln{flex:1;min-width:0}.lnm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lmt{font-size:12px;color:var(--tx3);margin-top:2px}
.le{text-align:right;flex-shrink:0}.lam{font-family:var(--fh);font-size:14px;font-weight:700}
.lch{color:var(--tx3);flex-shrink:0}

/* BADGES */
.bg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
.bp{background:var(--pbg2);color:var(--purple)}.bo{background:var(--obg2);color:var(--orange)}
.bgn{background:var(--gbg);color:var(--green)}.br{background:var(--rbg);color:var(--red)}
.bbl{background:var(--bbg);color:var(--blue)}.bgo{background:var(--gobg);color:var(--gold)}

/* BUTTONS */
.bt{padding:14px 24px;border-radius:var(--rs);border:none;cursor:pointer;font-family:var(--fh);font-size:14px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:var(--tr);width:100%;letter-spacing:.2px}
.bt:active{transform:scale(.97)}
.bt1{background:linear-gradient(135deg,var(--purple),var(--purple-d));color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.3)}
.bt2{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}
.bto{background:linear-gradient(135deg,var(--orange),#ea580c);color:#fff;box-shadow:0 4px 16px rgba(249,115,22,.3)}
.bsm{padding:10px 16px;font-size:12px;width:auto}

/* SEARCH / CHIPS */
.sw{display:flex;align-items:center;gap:10px;background:var(--inp);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 16px;margin-bottom:14px;transition:var(--tr)}
.sw:focus-within{border-color:var(--purple);box-shadow:0 0 0 3px var(--pbg)}
.sw input{background:none;border:none;outline:none;color:var(--tx);font-family:var(--f);font-size:14px;width:100%;font-weight:500}
.sw input::placeholder{color:var(--tx3)}.sw svg{color:var(--tx3);flex-shrink:0;width:18px;height:18px}
.cps{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}.cps::-webkit-scrollbar{display:none}
.cp{padding:8px 16px;border-radius:20px;border:1px solid var(--bd);background:var(--sf);color:var(--tx3);font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;transition:var(--tr);flex-shrink:0}
.cp:active{transform:scale(.95)}.cp.ac{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 2px 12px rgba(124,58,237,.3)}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;margin-top:8px}
.sht{font-family:var(--fh);font-size:16px;font-weight:800}
.shl{font-size:13px;font-weight:700;color:var(--purple);cursor:pointer}

/* OVERLAY / SHEET */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.ov.op{display:flex;animation:oi .2s ease}@keyframes oi{from{opacity:0}to{opacity:1}}
.st{background:var(--sf);border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;animation:su .3s cubic-bezier(.32,.72,0,1);padding-bottom:calc(env(safe-area-inset-bottom,16px)+16px)}
@keyframes su{from{transform:translateY(100%)}to{transform:none}}
.sth{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:10px auto 0}
.sthead{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd);margin-bottom:4px}
.sthead h3{font-family:var(--fh);font-size:17px;font-weight:800}
.stc{width:32px;height:32px;border-radius:50%;background:var(--sf2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2)}
.stb{padding:16px 20px}
.fd{margin-bottom:16px}.fd label{display:block;font-size:12px;color:var(--tx3);margin-bottom:6px;font-weight:700;letter-spacing:.3px}
.fc{width:100%;padding:13px 16px;background:var(--inp);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-family:var(--f);font-size:14px;font-weight:500;outline:none;transition:var(--tr)}
.fc:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--pbg)}
.fdr{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* PROGRESS */
.pr{height:6px;background:var(--inp);border-radius:3px;overflow:hidden;margin-top:8px}
.pf{height:100%;border-radius:3px;transition:width .6s ease}

/* MORE GRID */
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:8px 0}
.mi{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 8px;border-radius:var(--r);background:var(--sf2);border:1px solid var(--bd);cursor:pointer;transition:var(--tr)}
.mi:active{transform:scale(.94)}
.mii{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.mii svg{width:22px;height:22px}
.mi span{font-size:11px;font-weight:700;color:var(--tx2);text-align:center}

/* MONTH SCROLL */
.ms{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px}.ms::-webkit-scrollbar{display:none}
.mb{padding:10px 18px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sf);color:var(--tx3);cursor:pointer;font-family:var(--fh);font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;transition:var(--tr)}
.mb:active{transform:scale(.95)}.mb.ac{background:linear-gradient(135deg,var(--purple),var(--purple-d));color:#fff;border-color:var(--purple);box-shadow:0 4px 16px rgba(124,58,237,.3)}

/* CHART BARS */
.cb{display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:12px}
.cc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.cbr{width:100%;border-radius:6px 6px 3px 3px;min-height:3px;transition:height .5s ease}
.cbl{font-size:10px;color:var(--tx3);font-weight:600}.cbv{font-size:9px;color:var(--tx2);font-weight:700}

/* DETAIL */
.dh{background:linear-gradient(135deg,var(--purple),var(--orange));border-radius:var(--r);padding:24px;color:#fff;margin-bottom:16px;text-align:center;position:relative;overflow:hidden}
.dh::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07)}
.da{width:64px;height:64px;border-radius:18px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);font-family:var(--fh);font-size:24px;font-weight:800;backdrop-filter:blur(8px)}
.dn{font-family:var(--fh);font-size:22px;font-weight:800}
.db{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}

/* QUICK ACTIONS */
.qr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.qi{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 4px;border-radius:var(--rs);background:var(--sf);border:1px solid var(--bd);cursor:pointer;transition:var(--tr)}
.qi:active{transform:scale(.93)}
.qic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.qic svg{width:20px;height:20px}
.ql{font-size:10px;font-weight:700;color:var(--tx2);text-align:center}

/* TIMELINE */
.tl{display:flex;gap:12px;padding:12px 14px;background:var(--sf2);border-radius:var(--rs);margin-bottom:8px}
.tld{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.tlc{flex:1}.tlt{font-size:13px;font-weight:700}.tls{font-size:11px;color:var(--tx3);margin-top:2px}
.tlv{font-family:var(--fh);font-size:15px;font-weight:700;flex-shrink:0}

/* ═══════════════════════════════════════════
   DESKTOP — 768px+
   ═══════════════════════════════════════════ */
@media(min-width:768px){
  .side{display:flex}
  .main-wrap{margin-left:260px}
  .bn{display:none}
  .hd-logo-m{display:none}
  .hd-loc{display:flex}
  .pc{padding:24px 32px 32px;max-width:1200px;margin:0 auto}
  .sr{grid-template-columns:repeat(4,1fr)}
  .qr{grid-template-columns:repeat(4,1fr);gap:12px}
  .mg{grid-template-columns:repeat(4,1fr)}
  .hc{padding:32px}
  .hv{font-size:36px}
  .hstv{font-size:22px}
  .cb{height:160px}
  .li{padding:16px 20px}
  .la{width:48px;height:48px;border-radius:16px;font-size:16px}
  .lnm{font-size:15px}
  .fdr{grid-template-columns:1fr 1fr 1fr}
  .ov{align-items:center}
  .st{border-radius:20px;max-width:600px}
  .hr{gap:28px}
  .cd{padding:22px}
  /* 2-column layout for dashboard sections */
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .dash-grid>.full{grid-column:1/-1}
  .sp{padding:20px}
  .spv{font-size:22px}
}
@media(min-width:1100px){
  .pc{padding:28px 40px 40px}
  .sr{gap:14px}
  .qr{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>

<div class="app">

  </nav>
  <div class="side-section">Modulos</div>
  <nav class="side-nav">
    <button class="snb" onclick="gS('pck',rCk,this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>Check-in</button>

  <div><div class="sh"><div class="sht">Proximos Recebimentos</div><div class="shl" onclick="gT('fi',null,'snb')">Ver todos</div></div>${rch||'<div class="cd" style="text-align:center;color:var(--tx3);padding:30px">Nenhum no periodo</div>'}</div></div>`;
}

function rCl(){
  const q=($('si2')?$('si2').value:'').toLowerCase();
  const f=C.filter(c=>c.nm.toLowerCase().includes(q)&&(cf==='Todos'||c.st===cf));let l='';
  f.forEach(c=>{const v=PL[c.pl],vp=c.pa>1?c.pa+'x '+fv(v/c.pa):fv(v);l+=`<div class="li" onclick="sD(${c.id})"><div class="la" style="background:${c.st==='Ativo'?'var(--pbg2)':'var(--rbg)'};color:${c.st==='Ativo'?'var(--purple)':'var(--red)'}">${ini(c.nm)}</div><div class="ln"><div class="lnm">${c.nm}</div><div class="lmt">${c.pl} // ${c.fo} D+${PZ[c.fo]}</div></div><div class="le"><span class="bg ${c.st==='Ativo'?'bgn':'br'}">${c.st}</span><div class="lmt" style="margin-top:4px">${vp}</div></div><div class="lch">${I.ch}</div></div>`});
  $('pcl').innerHTML=`<div class="sw">${I.se}<input id="si2" placeholder="Buscar cliente..." oninput="rCl()" value="${q}"></div><div class="cps"><div class="cp ${cf==='Todos'?'ac':''}" onclick="cf='Todos';rCl()">Todos</div><div class="cp ${cf==='Ativo'?'ac':''}" onclick="cf='Ativo';rCl()">Ativos</div><div class="cp ${cf==='Vencido'?'ac':''}" onclick="cf='Vencido';rCl()">Vencidos</div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:13px;color:var(--tx3);font-weight:600">${f.length} clientes</div><button class="bt bt1 bsm" onclick="oS('ovc')">${I.pl} Novo</button></div>${l}`;
}

function sD(id){
  const c=C.find(x=>x.id===id);if(!c)return;const re=gr(c),v=PL[c.pl],p=PZ[c.fo];
  const rb=re.filter(x=>x.st==='Recebido').reduce((s,x)=>s+x.valor,0),ag=re.filter(x=>x.st==='Agendado').reduce((s,x)=>s+x.valor,0),pct=v>0?(rb/v)*100:0;
  const t=TR.find(x=>x.id===c.tr);let ph='';re.forEach(x=>{ph+=`<div class="tl"><div class="tld" style="background:${x.st==='Recebido'?'var(--green)':'var(--gold)'}"></div><div class="tlc"><div class="tlt">Parcela ${x.pa}</div><div class="tls">Venda: ${fd(x.dvd)} / Receb: ${fd(x.drc)} (D+${p})</div></div><div class="tlv" style="color:${x.st==='Recebido'?'var(--green)':'var(--gold)'}">${fv(x.valor)}</div></div>`});
  let trH='';if(t)t.ex.forEach(e=>{trH+=`<div class="tl"><div class="tld" style="background:var(--orange)"></div><div class="tlc"><div class="tlt">${e}</div></div></div>`});
  gS('pdt');
  $('pdt').innerHTML=`<div style="margin-bottom:16px"><button class="bt bt2 bsm" onclick="gT('cl',null,'snb')" style="width:auto">${I.bk} Voltar</button></div>
  <div class="dh"><div class="da">${ini(c.nm)}</div><div class="dn">${c.nm}</div><div class="db"><span class="bg" style="background:rgba(255,255,255,.15);color:#fff">${c.pl}</span><span class="bg" style="background:rgba(255,255,255,.15);color:#fff">${c.fo} D+${p}</span><span class="bg" style="background:${c.st==='Ativo'?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'};color:#fff">${c.st}</span></div></div>
  <div class="sr"><div class="sp"><div class="spl">Valor Total</div><div class="spv" style="font-size:18px">${fv(v)}</div><div class="sps">${c.pa}x de ${fv(v/c.pa)}</div></div><div class="sp"><div class="spl">Ja Recebido</div><div class="spv" style="font-size:18px;color:var(--green)">${fv(rb)}</div><div class="pr"><div class="pf" style="width:${pct}%;background:linear-gradient(90deg,var(--purple),var(--orange))"></div></div></div><div class="sp"><div class="spl">A Receber</div><div class="spv" style="font-size:18px;color:var(--orange)">${fv(ag)}</div></div><div class="sp"><div class="spl">Check-ins</div><div class="spv" style="font-size:18px;color:var(--purple)">${c.ci}</div><div class="sps">este periodo</div></div></div>
  <div class="dash-grid"><div class="cd"><div class="ch"><div class="ct">Contato</div></div><div style="font-size:13px;color:var(--tx2);line-height:1.8">${c.tl}<br>${c.em}<br>Vencimento: ${fd(c.vc)}</div></div>
  ${t?`<div class="cd"><div class="ch"><div class="ct">${t.nm}</div></div>${trH}</div>`:''}</div>
  <div class="cd"><div class="ch"><div class="ct">Cronograma de Parcelas</div></div>${ph}</div>`;
}

function rFi(){
  let mb2='';MS.forEach((m,i)=>{mb2+=`<button class="mb ${i===sm?'ac':''}" onclick="sm=${i};rFi()">${m}</button>`});
  const r=aR(),dm=r.filter(x=>x.mr===sm&&x.ar===2026),tot=dm.reduce((s,x)=>s+x.valor,0);
  const rb2=dm.filter(x=>x.st==='Recebido'),ag2=dm.filter(x=>x.st==='Agendado');
  const trb=rb2.reduce((s,x)=>s+x.valor,0),tag=ag2.reduce((s,x)=>s+x.valor,0);
  const pf={};dm.forEach(x=>{pf[x.fo]=(pf[x.fo]||0)+x.valor});const mf=Math.max(...Object.values(pf),1);
  let pjH='';Object.entries(pf).forEach(([f,v])=>{pjH+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:700">${f} <span style="color:var(--tx3);font-weight:400">D+${PZ[f]}</span></span><span style="color:${FCL[f]};font-weight:700">${fv(v)}</span></div><div class="pr"><div class="pf" style="width:${(v/mf)*100}%;background:${FCL[f]}"></div></div></div>`});
  let fl=dm;if(ff2!=='Todos')fl=dm.filter(x=>x.fo===ff2);let lH='';
  fl.forEach(x=>{lH+=`<div class="li" style="cursor:default"><div class="la" style="background:${x.st==='Recebido'?'var(--gbg)':'var(--gobg)'};color:${x.st==='Recebido'?'var(--green)':'var(--gold)'}"><div style="width:10px;height:10px;border-radius:50%;background:currentColor"></div></div><div class="ln"><div class="lnm">${x.cn}</div><div class="lmt">${x.fo} D+${PZ[x.fo]} // Parc ${x.pa}</div></div><div class="le"><div class="lam" style="color:var(--green)">+${fv(x.valor)}</div><span class="bg ${x.st==='Recebido'?'bgn':'bgo'}" style="margin-top:4px">${x.st}</span></div></div>`});
  if(!lH)lH='<div style="text-align:center;padding:30px;color:var(--tx3);font-size:14px;font-weight:600">Nenhum registro</div>';
  $('pfi').innerHTML=`<div class="ms">${mb2}</div><div class="sr"><div class="sp"><div class="spi" style="background:var(--pbg2);color:var(--purple)">${I.do}</div><div class="spl">Total ${MS[sm]}</div><div class="spv">${fv(tot)}</div></div><div class="sp"><div class="spi" style="background:var(--gbg);color:var(--green)">${I.ck}</div><div class="spl">Recebido</div><div class="spv" style="color:var(--green)">${fv(trb)}</div></div><div class="sp"><div class="spi" style="background:var(--obg2);color:var(--orange)">${I.cl}</div><div class="spl">A Receber</div><div class="spv" style="color:var(--orange)">${fv(tag)}</div></div><div class="sp"><div class="spi" style="background:var(--bbg);color:var(--blue)">${I.ct2}</div><div class="spl">Ticket Medio</div><div class="spv" style="color:var(--blue)">${dm.length?fv(tot/dm.length):'--'}</div></div></div>
  <div class="cd"><div class="ch"><div class="ct">Projecao por Forma</div></div>${pjH||'<div style="color:var(--tx3);font-size:13px">Sem dados</div>'}</div>
  <div class="sh"><div class="sht">Detalhamento</div></div>
  <div class="cps"><div class="cp ${ff2==='Todos'?'ac':''}" onclick="ff2='Todos';rFi()">Todos</div><div class="cp ${ff2==='Crédito'?'ac':''}" onclick="ff2='Crédito';rFi()">Credito</div><div class="cp ${ff2==='Débito'?'ac':''}" onclick="ff2='Débito';rFi()">Debito</div><div class="cp ${ff2==='PIX'?'ac':''}" onclick="ff2='PIX';rFi()">PIX</div><div class="cp ${ff2==='Boleto'?'ac':''}" onclick="ff2='Boleto';rFi()">Boleto</div></div>${lH}`;
}

function rTr(){
  let h='<div class="sh"><div class="sht">Fichas de Treino</div><button class="bt bt1 bsm" style="width:auto">${I.pl} Nova Ficha</button></div>';
  TR.forEach(t=>{const cnt=C.filter(c=>c.tr===t.id).length;let exH='';t.ex.forEach(e=>{exH+=`<div class="tl"><div class="tld" style="background:var(--orange)"></div><div class="tlc"><div class="tlt">${e}</div></div></div>`});
    h+=`<div class="cd" onclick="this.querySelector('.td2').style.display=this.querySelector('.td2').style.display==='none'?'block':'none'" style="cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-family:var(--fh);font-weight:800;font-size:15px">${t.nm}</div><div style="font-size:12px;color:var(--tx3);margin-top:2px">${t.ex.length} exercicios // ${cnt} alunos</div></div><span class="bg bp">${t.id}</span></div><div class="td2" style="display:none;margin-top:14px">${exH}</div></div>`;
  });$('ptr').innerHTML=h;
}

function rMa(){
  $('pma').innerHTML=`<div class="sh"><div class="sht">Mais Opcoes</div></div><div class="mg">
  <div class="mi" onclick="gS('pck',rCk)"><div class="mii" style="background:var(--gbg);color:var(--green)">${I.ck}</div><span>Check-in</span></div>
  <div class="mi" onclick="gS('pag',rAg)"><div class="mii" style="background:var(--bbg);color:var(--blue)">${I.cl}</div><span>Agenda</span></div>
  <div class="mi" onclick="gS('pav',rAv)"><div class="mii" style="background:var(--pbg2);color:var(--purple)">${I.al}</div><span>Avaliacao</span></div>
  <div class="mi" onclick="gS('ppr',rPr)"><div class="mii" style="background:var(--obg2);color:var(--orange)">${I.pk}</div><span>Produtos</span></div>
  <div class="mi" onclick="gS('pco',rCo)"><div class="mii" style="background:var(--gobg);color:var(--gold)">${I.cp3}</div><span>Contratos</span></div>
  <div class="mi" onclick="gS('pre',rRe)"><div class="mii" style="background:var(--bbg);color:var(--blue)">${I.ct2}</div><span>Relatorios</span></div>
  <div class="mi" onclick="gS('pcb',rCb)"><div class="mii" style="background:var(--rbg);color:var(--red)">${I.al}</div><span>Cobrancas</span></div></div>
  <div class="cd" style="margin-top:20px;text-align:center"><div style="font-family:var(--fh);font-weight:800;font-size:14px;margin-bottom:4px">Be Strong Academia</div><div style="font-size:12px;color:var(--tx3)">Av. Mal. Floriano Peixoto, 1766 - Indaial/SC</div></div>`;
}

// SUB PAGES
function rCk(){const ac2=C.filter(c=>c.st==='Ativo');let h=bB('ma',4)+'<div class="sh"><div class="sht">Check-in Hoje</div></div><div class="cd" style="text-align:center"><div style="font-family:var(--fh);font-size:42px;font-weight:800;color:var(--purple)">7</div><div style="font-size:13px;color:var(--tx3);font-weight:600">check-ins realizados hoje</div><div class="pr" style="margin-top:12px"><div class="pf" style="width:'+((7/ac2.length)*100)+'%;background:linear-gradient(90deg,var(--purple),var(--orange))"></div></div><div style="font-size:11px;color:var(--tx3);margin-top:4px">7 de '+ac2.length+' ativos</div></div><div class="sh"><div class="sht">Registrar</div></div>';ac2.forEach(c=>{h+=`<div class="li"><div class="la" style="background:var(--pbg2);color:var(--purple)">${ini(c.nm)}</div><div class="ln"><div class="lnm">${c.nm}</div><div class="lmt">${c.ci} check-ins</div></div><button class="bt bt1 bsm" style="width:auto;padding:8px 14px" onclick="this.innerHTML='OK';this.style.background='var(--green)';this.disabled=true">${I.ck}</button></div>`});$('pck').innerHTML=h}

function rAg(){let h=bB('ma',4)+'<div class="sh"><div class="sht">Agenda de Aulas</div><button class="bt bt1 bsm" style="width:auto">'+I.pl+' Nova</button></div>';AU.forEach(a=>{const pct=(a.ins/a.vg)*100,fl=a.ins>=a.vg;h+=`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><div style="font-family:var(--fh);font-weight:800;font-size:15px">${a.nm}</div><div style="font-size:12px;color:var(--tx3);margin-top:2px">${a.pf} // ${a.d}</div></div><span class="bg ${fl?'br':'bgn'}" style="font-size:13px;padding:6px 14px">${a.hr}</span></div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--tx3)">${a.ins}/${a.vg} vagas</span><span style="color:${fl?'var(--red)':'var(--green)'};font-weight:700">${fl?'Lotada':((a.vg-a.ins)+' disponiveis')}</span></div><div class="pr"><div class="pf" style="width:${pct}%;background:${fl?'var(--red)':'linear-gradient(90deg,var(--purple),var(--orange))'}"></div></div></div>`});$('pag').innerHTML=h}

function rAv(){let h=bB('ma',4)+'<div class="sh"><div class="sht">Avaliacoes Fisicas</div></div><div class="cd"><div class="ch"><div class="ct">Proximas Avaliacoes</div></div>';C.filter(c=>c.st==='Ativo').slice(0,5).forEach(c=>{h+=`<div class="li" style="margin-bottom:4px"><div class="la" style="background:var(--pbg2);color:var(--purple)">${ini(c.nm)}</div><div class="ln"><div class="lnm">${c.nm}</div><div class="lmt">Peso: ${(60+Math.random()*30).toFixed(1)}kg // IMC: ${(19+Math.random()*8).toFixed(1)}</div></div><button class="bt bsm bt2" style="width:auto">Avaliar</button></div>`});h+='</div><div class="sr"><div class="sp"><div class="spl">Peso Medio</div><div class="spv" style="font-size:18px;color:var(--purple)">74.2kg</div></div><div class="sp"><div class="spl">IMC Medio</div><div class="spv" style="font-size:18px;color:var(--orange)">24.1</div></div></div>';$('pav').innerHTML=h}

function rPr(){let h=bB('ma',4)+'<div class="sh"><div class="sht">Produtos</div><button class="bt bto bsm" style="width:auto">'+I.pl+' Novo</button></div>';PR.forEach(p=>{h+=`<div class="li"><div class="la" style="background:var(--obg2);color:var(--orange)">${I.pk}</div><div class="ln"><div class="lnm">${p.nm}</div><div class="lmt">${p.ct} // Estoque: ${p.es}</div></div><div class="le"><div class="lam" style="color:var(--orange)">${fv(p.pr)}</div></div></div>`});$('ppr').innerHTML=h}

function rCo(){let h=bB('ma',4)+'<div class="sh"><div class="sht">Contratos Digitais</div></div>';C.filter(c=>c.st==='Ativo').forEach(c=>{h+=`<div class="li"><div class="la" style="background:var(--gobg);color:var(--gold)">${I.cp3}</div><div class="ln"><div class="lnm">${c.nm}</div><div class="lmt">${c.pl} // Venc: ${fd(c.vc)}</div></div><span class="bg bgn">Assinado</span></div>`});C.filter(c=>c.st==='Vencido').forEach(c=>{h+=`<div class="li"><div class="la" style="background:var(--rbg);color:var(--red)">${I.cp3}</div><div class="ln"><div class="lnm">${c.nm}</div><div class="lmt">${c.pl} // Venc: ${fd(c.vc)}</div></div><span class="bg br">Vencido</span></div>`});$('pco').innerHTML=h}

function rRe(){const r=aR(),at=C.filter(c=>c.st==='Ativo').length,rt=r.filter(x=>x.st==='Recebido').reduce((s,x)=>s+x.valor,0),agt=r.filter(x=>x.st==='Agendado').reduce((s,x)=>s+x.valor,0);let plH='';['Mensal','Trimestral','Semestral','Anual'].forEach(p=>{const cnt=C.filter(c=>c.pl===p).length;const pct=C.length>0?(cnt/C.length)*100:0;plH+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:700">${p}</span><span style="color:var(--purple);font-weight:700">${cnt} (${pct.toFixed(0)}%)</span></div><div class="pr"><div class="pf" style="width:${pct}%;background:linear-gradient(90deg,var(--purple),var(--orange))"></div></div></div>`});
$('pre').innerHTML=bB('ma',4)+'<div class="sh"><div class="sht">Relatorios</div></div><div class="sr"><div class="sp"><div class="spl">Total Recebido</div><div class="spv" style="font-size:16px;color:var(--green)">'+fv(rt)+'</div></div><div class="sp"><div class="spl">Total a Receber</div><div class="spv" style="font-size:16px;color:var(--orange)">'+fv(agt)+'</div></div><div class="sp"><div class="spl">Clientes Ativos</div><div class="spv" style="font-size:18px;color:var(--purple)">'+at+'</div></div><div class="sp"><div class="spl">Retencao</div><div class="spv" style="font-size:18px;color:var(--green)">'+((at/C.length)*100).toFixed(0)+'%</div></div></div><div class="cd"><div class="ch"><div class="ct">Distribuicao de Planos</div></div>'+plH+'</div>'}

function rCb(){const vc2=C.filter(c=>c.st==='Vencido');let h=bB('ma',4);h+=`<div class="hc" style="background:linear-gradient(135deg,#dc2626,#ef4444,var(--orange));margin-bottom:16px"><div class="hl">INADIMPLENCIA</div><div class="hv">${vc2.length} clientes</div><div class="hs">${fv(vc2.reduce((s,c)=>s+PL[c.pl],0))} em planos vencidos</div></div><div class="sh"><div class="sht">Inadimplentes</div></div>`;vc2.forEach(c=>{const dias=Math.floor((new Date('2026-04-01')-new Date(c.vc))/(1000*60*60*24));h+=`<div class="li"><div class="la" style="background:var(--rbg);color:var(--red)">${ini(c.nm)}</div><div class="ln"><div class="lnm">${c.nm}</div><div class="lmt">${c.pl} // Vencido ha ${dias} dias</div></div><div class="le"><div class="lam" style="color:var(--red)">${fv(PL[c.pl])}</div><button class="bt bsm" style="width:auto;padding:6px 12px;background:var(--rbg);color:var(--red);font-size:10px;margin-top:4px;border:none">Cobrar</button></div></div>`});$('pcb').innerHTML=h}

function tP(){const f=$('ffo').value;$('fpa').disabled=(f!=='Crédito');if(f!=='Crédito')$('fpa').value='1'}
function aC(){const n=$('fn').value.trim();if(!n)return;const pl=$('fpl').value,fo=$('ffo').value,pa=parseInt($('fpa').value),dv=$('fdv').value;const vc=new Date(dv);vc.setMonth(vc.getMonth()+PM[pl]);C.unshift({id:Date.now(),nm:n,tl:$('ft').value,em:$('fe').value,pl,fo,pa,dv,st:'Ativo',vc:vc.toISOString().split('T')[0],ci:0,tr:'A'});cS('ovc');$('fn').value='';$('ft').value='';$('fe').value='';if(cp2==='cl')rCl();if(cp2==='h')rH()}
rH();
</script>
</body>
</html>
